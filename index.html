<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SPEDISCI CON NOI / Ship With Us / Envía Con Nosotros</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f7fa;display:flex;justify-content:center;padding:2rem 1rem;min-height:100vh}
.wrap{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:2rem;width:100%;max-width:640px}

/* SELEZIONE LINGUA */

.lang-logo{font-size:40px;margin-bottom:1rem}
.lang-title{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:6px}
.lang-sub{font-size:14px;color:#6b7280;margin-bottom:2rem}
.lang-btns{display:flex;flex-direction:column;gap:12px;max-width:320px;margin:0 auto}
.lang-btn{display:flex;align-items:center;gap:14px;padding:14px 20px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;cursor:pointer;transition:all .15s;font-size:16px;font-weight:600;color:#374151}
.lang-btn:hover{border-color:#185FA5;background:#f0f7ff;color:#185FA5}
.lang-btn .flag{font-size:28px}
.lang-btn .lang-name{text-align:left}
.lang-btn .lang-native{font-size:12px;color:#9ca3af;font-weight:400}

/* STEPPER */
.stepper{display:flex;align-items:flex-start;margin-bottom:2rem}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.sc{width:30px;height:30px;border-radius:50%;border:2px solid #e5e7eb;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#9ca3af}
.step.active .sc{border-color:#185FA5;background:#185FA5;color:#fff}
.step.done .sc{border-color:#16a34a;background:#16a34a;color:#fff}
.sl{font-size:10px;color:#9ca3af;text-align:center;font-weight:500;line-height:1.3}
.step.active .sl{color:#185FA5;font-weight:700}
.step.done .sl{color:#16a34a}
.sline{flex:1;height:2px;background:#e5e7eb;margin-top:14px}
.sline.done{background:#16a34a}
.panel{display:none}.panel.show{display:block}
h2{font-size:19px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.sub{font-size:13px;color:#6b7280;margin-bottom:1.5rem;line-height:1.5}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin:1.25rem 0 8px}
.lbl:first-of-type{margin-top:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:.875rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:.875rem}
.g1{margin-bottom:.875rem}
.fd{display:flex;flex-direction:column;gap:4px}
.fd label{font-size:13px;color:#6b7280}
.fd input,.fd select,.fd textarea{padding:9px 11px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;color:#1a1a2e;outline:none;width:100%;background:#fff;font-family:inherit}
.fd input:focus,.fd select:focus,.fd textarea:focus{border-color:#185FA5}
.fd textarea{resize:vertical;min-height:72px}
.opt{font-size:11px;color:#9ca3af;margin-left:4px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{padding:6px 13px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#6b7280;transition:all .15s}
.tab:hover{border-color:#185FA5;color:#185FA5;background:#f0f7ff}
.tab.active{border-color:#185FA5;background:#EBF3FC;color:#185FA5}
.crow{display:flex;align-items:center;gap:8px;margin:.5rem 0 1rem;cursor:pointer}
.crow input[type=checkbox]{width:17px;height:17px;accent-color:#185FA5;flex-shrink:0;cursor:pointer}
.crow label{font-size:14px;color:#374151;cursor:pointer}
.coll{display:none}.coll.show{display:block}
.ipill{font-size:12px;color:#1e40af;background:#EBF3FC;border-radius:6px;padding:7px 11px;line-height:1.5;margin-bottom:.875rem}
.warn{font-size:13px;color:#92400e;background:#FEF3C7;border-radius:8px;padding:8px 12px;margin-bottom:12px;display:none}
.err{font-size:13px;color:#991b1b;background:#FEE2E2;border-radius:8px;padding:8px 12px;margin-bottom:10px;display:none}
.rbox{background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:12px;padding:1.25rem;display:none;margin-top:1rem;margin-bottom:1rem}
.rbox.show{display:block}
.rtit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:10px}
.prow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0}
.prow:last-child{border-bottom:none}
.plbl{font-size:13px;color:#6b7280;flex:1}
.pval{font-size:13px;font-weight:700;color:#1a1a2e;margin-left:10px;white-space:nowrap}
.ptot{display:flex;justify-content:space-between;align-items:baseline;padding-top:12px;margin-top:4px;border-top:2px solid #e5e7eb}
.ptlbl{font-size:14px;font-weight:700;color:#1a1a2e}
.ptval{font-size:26px;font-weight:800;color:#185FA5}
.pnote{font-size:11px;color:#9ca3af;margin-top:8px;line-height:1.5}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;background:#EBF3FC;color:#185FA5;margin-left:6px;vertical-align:middle}
.recap{background:#f8fafc;border:1.5px solid #e5e7eb;border-radius:10px;padding:1rem 1.25rem;margin-bottom:12px}
.recap-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#185FA5;margin-bottom:8px}
.rrow{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:#374151;gap:12px}
.rrow span:first-child{color:#9ca3af;flex-shrink:0}
.rrow span:last-child{text-align:right}
.rtot{display:flex;justify-content:space-between;font-size:15px;font-weight:800;color:#185FA5;padding-top:8px;margin-top:6px;border-top:2px solid #bdd4ef}
.pay-box{border:1.5px solid #e5e7eb;border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.pay-tit{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.pay-amt{font-size:32px;font-weight:800;color:#185FA5;margin:12px 0}
.pay-note{font-size:12px;color:#9ca3af;line-height:1.6;margin-top:.75rem}
.btn-row{display:flex;gap:10px;margin-top:1rem}
.btn{flex:1;padding:11px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.btn:hover{background:#0C447C}
.btn-out{flex:1;padding:11px;background:transparent;color:#185FA5;border:1.5px solid #185FA5;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.btn-out:hover{background:#EBF3FC}
.btn-calc{width:100%;padding:12px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.btn-calc:hover{background:#0C447C}
.btn-next{display:none;width:100%;padding:12px;background:#185FA5;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-next:hover{background:#0C447C}
.btn-invia{width:100%;padding:13px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.btn-invia:hover{background:#15803d}
.btn-invia:disabled{background:#86efac;cursor:not-allowed}
.success{text-align:center;padding:2rem 0}
.sico{width:68px;height:68px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:32px}
.stit{font-size:21px;font-weight:800;color:#15803d;margin-bottom:8px}
.stxt{font-size:14px;color:#6b7280;line-height:1.7}
.ok-box{background:#f0fdf4;border-radius:10px;padding:1rem;margin:1.25rem 0;text-align:left}
.ok-lbl{font-size:13px;color:#15803d;font-weight:700;margin-bottom:4px}
.ok-val{font-size:13px;color:#374151}
hr.div{border:none;border-top:1.5px solid #f0f0f0;margin:1.25rem 0}
.dog-box{background:#fff8ed;border:1.5px solid #fed7aa;border-radius:10px;padding:1rem 1.25rem;margin:1rem 0;display:none}
.dog-box.show{display:block}
.dog-tit{font-size:12px;font-weight:700;color:#9a3412;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.dog-sub{font-size:12px;color:#9a3412;margin-bottom:12px;line-height:1.5}
.dog-head{display:grid;grid-template-columns:1fr 72px 88px 32px;gap:8px;margin-bottom:4px}
.dog-head span{font-size:11px;color:#9ca3af;font-weight:600}
.dog-row{display:grid;grid-template-columns:1fr 72px 88px 32px;gap:8px;align-items:center;margin-bottom:6px}
.dog-row input{padding:7px 8px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:13px;color:#1a1a2e;outline:none;width:100%;background:#fff}
.dog-row input:focus{border-color:#ea580c}
.btn-add{background:#fff7ed;border:1.5px dashed #fb923c;border-radius:8px;padding:7px;width:100%;font-size:13px;color:#ea580c;cursor:pointer;font-weight:600;margin-top:4px}
.btn-add:hover{background:#ffedd5}
.btn-del{background:none;border:none;color:#ef4444;font-size:20px;cursor:pointer;padding:0;line-height:1;font-weight:700}
.dog-tot{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:#9a3412;padding-top:8px;border-top:1px solid #fed7aa;margin-top:6px}
/* lang switcher in alto */
.lang-bar{display:flex;justify-content:flex-end;margin-bottom:1.25rem;gap:8px}
.lang-pill{padding:5px 12px;border:1.5px solid #e5e7eb;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:#6b7280;transition:all .15s}
.lang-pill:hover{border-color:#185FA5;color:#185FA5}
.lang-pill.active{border-color:#185FA5;background:#EBF3FC;color:#185FA5}
@media(max-width:500px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}.g3 .fd:last-child{grid-column:span 2}.sl{font-size:9px}.dog-head{grid-template-columns:1fr 56px 76px 28px}.dog-row{grid-template-columns:1fr 56px 76px 28px}.lang-btns{max-width:100%}}
</style>
</head>
<body>
<div class="wrap">

<!-- BARRA CAMBIO LINGUA (appare dopo selezione) -->
<div class="lang-bar" id="lang-bar" style="display:flex">
  <button type="button" class="lang-pill active" id="pill-it" onclick="cambiaLingua('it')">&#127470;&#127481; IT</button>
  <button type="button" class="lang-pill" id="pill-en" onclick="cambiaLingua('en')">&#127468;&#127463; EN</button>
  <button type="button" class="lang-pill" id="pill-es" onclick="cambiaLingua('es')">&#127466;&#127480; ES</button>
</div>



<!-- STEPPER -->
<div class="stepper" id="stepper">
  <div class="step active" id="s1"><div class="sc" id="sc1">1</div><div class="sl" id="sl1">-</div></div>
  <div class="sline" id="l1"></div>
  <div class="step" id="s2"><div class="sc" id="sc2">2</div><div class="sl" id="sl2">-</div></div>
  <div class="sline" id="l2"></div>
  <div class="step" id="s3"><div class="sc" id="sc3">3</div><div class="sl" id="sl3">-</div></div>
  <div class="sline" id="l3"></div>
  <div class="step" id="s4"><div class="sc" id="sc4">4</div><div class="sl" id="sl4">-</div></div>
  <div class="sline" id="l4"></div>
  <div class="step" id="s5"><div class="sc" id="sc5">5</div><div class="sl" id="sl5">-</div></div>
  <div class="sline" id="l5"></div>
  <div class="step" id="s6"><div class="sc" id="sc6">6</div><div class="sl" id="sl6">-</div></div>
  <div class="sline" id="l6"></div>
  <div class="step" id="s7"><div class="sc" id="sc7">7</div><div class="sl" id="sl7">-</div></div>
</div>

<!-- STEP 1 -->
<div class="panel show" id="p1">
  <h2 id="t-h1"></h2>
  <p class="sub" id="t-sub1"></p>
  <p class="lbl" id="t-lbl-dest"></p>
  <div class="tabs">
    <button type="button" class="tab active" id="tab-italia" onclick="setZona('italia')">&#127470;&#127481; Italia</button>
    <button type="button" class="tab" id="tab-ue" onclick="setZona('ue')">&#127466;&#127482; Europa UE</button>
    <button type="button" class="tab" id="tab-eu_non_ue" onclick="setZona('eu_non_ue')" id="t-tab-en"></button>
    <button type="button" class="tab" id="tab-us_ca" onclick="setZona('us_ca')">&#127482;&#127480; USA/CA</button>
    <button type="button" class="tab" id="tab-resto" onclick="setZona('resto')" id="t-tab-re"></button>
  </div>
  <p class="lbl"><span id="t-lbl-dim"></span> <span class="opt" id="t-lbl-opt"></span></p>
  <div class="g3">
    <div class="fd"><label id="t-lung"></label><input type="number" id="lung" min="1" placeholder="30"></div>
    <div class="fd"><label id="t-larg"></label><input type="number" id="larg" min="1" placeholder="20"></div>
    <div class="fd"><label id="t-alt"></label><input type="number" id="alt" min="1" placeholder="15"></div>
  </div>
  <p class="lbl" id="t-lbl-peso"></p>
  <div class="g2">
    <div class="fd"><label id="t-peso-lbl"></label><input type="number" id="peso" min="0.1" step="0.1" placeholder="2.5"></div>
    <div class="fd"><label id="t-valore-lbl"></label><input type="number" id="valore" min="0" placeholder="150" oninput="updAssic()"></div>
  </div>
  <div class="crow" onclick="togChk('chk-assic','box-assic',updAssic)">
    <input type="checkbox" id="chk-assic">
    <label for="chk-assic" id="t-assic-chk"></label>
  </div>
  <div class="coll" id="box-assic">
    <div class="ipill" id="assic-info"></div>
  </div>
  <div class="warn" id="warn-vol"></div>
  <div class="err" id="err1"></div>
  <button type="button" class="btn-calc" id="t-btn-calc" onclick="calcola()"></button>
  <div class="rbox" id="res1">
    <div class="rtit"><span id="t-prev-tit"></span> <span class="badge" id="r-zona"></span></div>
    <div id="r-rows"></div>
    <div class="ptot">
      <span class="ptlbl" id="r-tlbl"></span>
      <span class="ptval" id="r-tval"></span>
    </div>
    <p class="pnote" id="r-note"></p>
  </div>
  <button type="button" class="btn-next" id="btn-n1" onclick="goStep(2)"></button>
</div>

<!-- STEP 2 -->
<div class="panel" id="p2">
  <h2 id="t-h2"></h2>
  <p class="sub" id="t-sub2"></p>
  <div class="g2">
    <div class="fd"><label id="t-m-nome-lbl"></label><input type="text" id="m-nome" placeholder="Mario Rossi"></div>
    <div class="fd"><label id="t-m-az-lbl"></label><input type="text" id="m-azienda"></div>
  </div>
  <div class="g2">
    <div class="fd"><label id="t-m-cf-lbl"></label><input type="text" id="m-cf" placeholder="RSSMRA80A01H501Z"></div>
    <div class="fd"><label id="t-m-tel-lbl"></label><input type="tel" id="m-tel" placeholder="+39 333 1234567"></div>
  </div>
  <div class="g1 fd"><label id="t-m-email-lbl"></label><input type="email" id="m-email" placeholder="mario@email.com"></div>
  <hr class="div">
  <p class="lbl" id="t-m-addr-lbl"></p>
  <div class="g1 fd"><label id="t-via-lbl"></label><input type="text" id="m-via" placeholder="Via Roma 12"></div>
  <div class="g3">
    <div class="fd"><label id="t-cap-lbl"></label><input type="text" id="m-cap" placeholder="70132" maxlength="10"></div>
    <div class="fd"><label id="t-city-lbl"></label><input type="text" id="m-citta" placeholder="Bari"></div>
    <div class="fd"><label id="t-prov-lbl"></label><input type="text" id="m-prov" placeholder="BA" maxlength="5"></div>
  </div>
  <div class="g1 fd"><label id="t-country-lbl"></label><input type="text" id="m-paese" value="Italia"></div>
  <hr class="div">
  <div class="crow" onclick="togChk('chk-ritiro','box-ritiro',null)">
    <input type="checkbox" id="chk-ritiro">
    <label for="chk-ritiro" id="t-ritiro-chk"></label>
  </div>
  <div class="coll" id="box-ritiro">
    <p class="lbl" id="t-ritiro-lbl"></p>
    <div class="g1 fd"><label id="t-rvia-lbl"></label><input type="text" id="r-via"></div>
    <div class="g3">
      <div class="fd"><label id="t-rcap-lbl"></label><input type="text" id="r-cap" maxlength="10"></div>
      <div class="fd"><label id="t-rcity-lbl"></label><input type="text" id="r-citta"></div>
      <div class="fd"><label id="t-rprov-lbl"></label><input type="text" id="r-prov" maxlength="5"></div>
    </div>
    <div class="g1 fd"><label id="t-rcountry-lbl"></label><input type="text" id="r-paese" value="Italia"></div>
    <div class="g2">
      <div class="fd"><label id="t-rref-lbl"></label><input type="text" id="r-ref"></div>
      <div class="fd"><label id="t-rtel-lbl"></label><input type="tel" id="r-tel"></div>
    </div>
  </div>
  <div class="err" id="err2"></div>
  <div class="btn-row">
    <button type="button" class="btn-out" id="t-back2" onclick="goStep(1)"></button>
    <button type="button" class="btn" id="t-next2" onclick="valida(2)"></button>
  </div>
</div>

<!-- STEP 3 -->
<div class="panel" id="p3">
  <h2 id="t-h3"></h2>
  <p class="sub" id="t-sub3"></p>
  <div class="g2">
    <div class="fd"><label id="t-d-nome-lbl"></label><input type="text" id="d-nome"></div>
    <div class="fd"><label id="t-d-az-lbl"></label><input type="text" id="d-azienda"></div>
  </div>
  <div class="g2">
    <div class="fd"><label id="t-d-tel-lbl"></label><input type="tel" id="d-tel"></div>
    <div class="fd"><label id="t-d-email-lbl"></label><input type="email" id="d-email"></div>
  </div>
  <hr class="div">
  <p class="lbl" id="t-d-addr-lbl"></p>
  <div class="g1 fd"><label id="t-dvia-lbl"></label><input type="text" id="d-via"></div>
  <div class="g3">
    <div class="fd"><label id="t-dcap-lbl"></label><input type="text" id="d-cap" maxlength="10"></div>
    <div class="fd"><label id="t-dcity-lbl"></label><input type="text" id="d-citta"></div>
    <div class="fd"><label id="t-dprov-lbl"></label><input type="text" id="d-prov" maxlength="5"></div>
  </div>
  <div class="g1 fd"><label id="t-dcountry-lbl"></label><input type="text" id="d-paese"></div>
  <hr class="div">
  <div class="crow" onclick="togChk('chk-fatt','box-fatt',null)">
    <input type="checkbox" id="chk-fatt">
    <label for="chk-fatt" id="t-fatt-chk"></label>
  </div>
  <div class="coll" id="box-fatt">
    <p class="lbl" id="t-fatt-lbl"></p>
    <div class="g2">
      <div class="fd"><label id="t-f-nome-lbl"></label><input type="text" id="f-nome"></div>
      <div class="fd"><label id="t-f-cf-lbl"></label><input type="text" id="f-cf"></div>
    </div>
    <div class="g1 fd"><label id="t-fvia-lbl"></label><input type="text" id="f-via"></div>
    <div class="g3">
      <div class="fd"><label id="t-fcap-lbl"></label><input type="text" id="f-cap" maxlength="10"></div>
      <div class="fd"><label id="t-fcity-lbl"></label><input type="text" id="f-citta"></div>
      <div class="fd"><label id="t-fprov-lbl"></label><input type="text" id="f-prov" maxlength="5"></div>
    </div>
    <div class="g2">
      <div class="fd"><label id="t-fcountry-lbl"></label><input type="text" id="f-paese" value="Italia"></div>
      <div class="fd"><label id="t-femail-lbl"></label><input type="email" id="f-email"></div>
    </div>
    <div class="g1 fd"><label id="t-fsdi-lbl"></label><input type="text" id="f-sdi"></div>
  </div>
  <div class="err" id="err3"></div>
  <div class="btn-row">
    <button type="button" class="btn-out" id="t-back3" onclick="goStep(2)"></button>
    <button type="button" class="btn" id="t-next3" onclick="valida(3)"></button>
  </div>
</div>

<!-- STEP 4 -->
<div class="panel" id="p4">
  <h2 id="t-h4"></h2>
  <p class="sub" id="t-sub4"></p>
  <div class="g1 fd"><label id="t-mc-desc-lbl"></label><textarea id="mc-desc"></textarea></div>
  <div class="g2">
    <div class="fd">
      <label id="t-mc-cat-lbl"></label>
      <select id="mc-cat">
        <option value="" id="t-cat-sel"></option>
        <option id="t-cat1"></option><option id="t-cat2"></option><option id="t-cat3"></option>
        <option id="t-cat4"></option><option id="t-cat5"></option><option id="t-cat6"></option>
        <option id="t-cat7"></option><option id="t-cat8"></option><option id="t-cat9"></option>
        <option id="t-cat10"></option><option id="t-cat11"></option><option id="t-cat12"></option>
        <option id="t-cat13"></option><option id="t-cat14"></option>

function togChk(chkId,boxId,cb){
  var c=g(chkId); c.checked=!c.checked;
  g(boxId).classList.toggle('show',c.checked);
  if(cb) cb();
}

function assic(val){
  if(!val||val<=0) return null;
  var imp=val<=1100?11:val*0.01;
  var iva=isIva()?imp*0.22:0;
  var sog=val<=1100?'1.100':'1%';
  var ivs=isIva()?' + IVA 22%':' '+( lingua==='it'?'esente IVA':lingua==='en'?'VAT exempt':'exento IVA');
  return{imp:imp,iva:iva,tot:imp+iva,iva_si:isIva(),lb:'Assicurazione/Insurance/Seguro ('+sog+ivs+')'};
}

function updAssic(){
  if(!g('chk-assic').checked) return;
  var val=parseFloat(g('valore').value)||0;
  var info=g('assic-info');
  var t=T();
  if(!val){info.innerHTML=t.assic_info;return;}
  var a=assic(val);
  info.textContent='Costo: '+fmt(a.imp)+(a.iva_si?' + IVA 22% = '+fmt(a.tot):'');
}

  var box=g('dog-box');

    box.classList.add('show');

    box.classList.remove('show');

function delDogRow(id){
  var el=g(id); if(el) el.parentNode.removeChild(el);
  calcDogTot();
}

function calcDogTot(){
  var rows=g('dog-rows').querySelectorAll('.dog-row');
  var tot=0;
  for(var i=0;i<rows.length;i++){
    var q=parseFloat(rows[i].querySelector('[id$="q"]').value)||0;
    var vl=parseFloat(rows[i].querySelector('[id$="v"]').value)||0;
    tot+=q*vl;
  }
  var totEl=g('dog-tot');
  if(tot>0){totEl.style.display='flex';g('dog-tot-val').textContent=fmt(tot);}
  else totEl.style.display='none';
  return tot;
}

function getDogList(){
  var rows=g('dog-rows').querySelectorAll('.dog-row'); var list=[];
  for(var i=0;i<rows.length;i++){
    var desc=rows[i].querySelector('[id$="d"]').value.trim();
    var qty=parseFloat(rows[i].querySelector('[id$="q"]').value)||0;
    var val=parseFloat(rows[i].querySelector('[id$="v"]').value)||0;
    if(desc&&qty&&val) list.push({desc:desc,qty:qty,val:val,tot:qty*val});
  }
  return list;
}

function calcola(){
  var t=T();
  g('err1').style.display='none';
  var l=parseFloat(g('lung').value)||0,w=parseFloat(g('larg').value)||0,h=parseFloat(g('alt').value)||0;
  var pr=parseFloat(g('peso').value)||0;
  var val=parseFloat(g('valore').value)||0;
  var ca=g('chk-assic').checked;
  if(!pr){showE('err1',t.err_peso);return;}
  if(ca&&!val){showE('err1',t.err_assic);return;}
  var pv=0,uv=false;
  if(l&&w&&h){pv=(l*w*h)/5000;uv=pv>pr;}
  var pf=Math.max(pr,pv);
  g('warn-vol').style.display=uv?'block':'none';
  var sc=null,ac=0,k=zk();
  if(pf<=30){for(var i=0;i<SC.length;i++){if(pf<=SC[i].mx){sc=SC[i];break;}}}
  else{sc=SC[SC.length-1];ac=Math.ceil(pf-30)*ADD[zona];}
  if(!sc){showE('err1',t.err_peso);return;}
  var base=sc[k],tot=base+ac;
  var html='<div class="prow"><span class="plbl">'+sc.lb+' \u2014 '+NZ[zona]+'</span><span class="pval">'+fmt(base)+'</span></div>';
  if(ac>0) html+='<div class="prow"><span class="plbl">'+t.suppl+' ('+Math.ceil(pf-30)+'kg x '+fmt(ADD[zona])+')</span><span class="pval">'+fmt(ac)+'</span></div>';
  var ad=null;
  if(ca&&val){
    ad=assic(val);tot+=ad.tot;
    if(ad.iva_si){
      html+='<div class="prow"><span class="plbl">'+t.assic_imp+'</span><span class="pval">'+fmt(ad.imp)+'</span></div>';
      html+='<div class="prow"><span class="plbl">'+t.assic_iva+'</span><span class="pval">'+fmt(ad.iva)+'</span></div>';
    }else{
      html+='<div class="prow"><span class="plbl">'+t.assic_imp+'</span><span class="pval">'+fmt(ad.imp)+'</span></div>';
    }
  }
  if(uv) html+='<div class="prow"><span class="plbl" style="font-size:11px;color:#9ca3af">Vol: '+pv.toFixed(2)+'kg / '+t.peso_lbl.replace(' *','')+': '+pr.toFixed(2)+'kg</span></div>';
  var civaf=ca&&val&&isIva();
  g('r-rows').innerHTML=html;
  g('r-tval').textContent=fmt(tot);
  g('r-tlbl').textContent=civaf?t.tot_iva:t.tot;
  g('r-zona').textContent=NZ[zona];
  g('r-note').textContent=t.note[zona];
  g('res1').classList.add('show');
  g('btn-n1').style.display='block';
  prev={zona:zona,nz:NZ[zona],sc:sc,base:base,ac:ac,ad:ad,tot:tot,civaf:civaf,pr:pr,pf:pf,uv:uv,pv:pv,val:val,esente:!isIva()};
}

function goStep(n){
  g('p'+stepNow).classList.remove('show');
  if(n===5) buildRecap();
  if(n===7) buildPay();
  var target=n<=7?g('p'+n):g('p-ok');
  target.classList.add('show');
  stepNow=n; updStepper(n); window.scrollTo(0,0);
}

function updStepper(n){
  for(var i=1;i<=7;i++){
    var s=g('s'+i),sc=g('sc'+i);
    s.classList.remove('active','done');
    if(i<n){s.classList.add('done');sc.textContent='\u2713';}
    else if(i===n){s.classList.add('active');sc.textContent=i;}
    else sc.textContent=i;
    if(i<7) g('l'+i).classList.toggle('done',i<n);
  }
}

function showE(id,msg){var e=g(id);e.textContent=msg;e.style.display='block';}
function req(id,eid,msg){if(!v(id)){g(id).focus();showE(eid,msg);return false;}return true;}

function valida(n){
  var t=T(),eid='err'+n;
  g(eid).style.display='none';
  if(n===2){
    if(!req('m-nome',eid,t.err_mnome)) return;
    if(!req('m-cf',eid,t.err_mcf)) return;
    if(!req('m-tel',eid,t.err_mtel)) return;
    if(!req('m-email',eid,t.err_memail)) return;
    if(!req('m-via',eid,t.err_mvia)) return;
    if(!req('m-cap',eid,t.err_mcap)) return;
    if(!req('m-citta',eid,t.err_mcity)) return;
    if(g('chk-ritiro').checked){
      if(!req('r-via',eid,t.err_rvia)) return;
      if(!req('r-cap',eid,t.err_rcap)) return;
      if(!req('r-citta',eid,t.err_rcity)) return;
    }
  }
  if(n===3){
    if(!req('d-nome',eid,t.err_dnome)) return;
    if(!req('d-tel',eid,t.err_dtel)) return;
    if(!req('d-via',eid,t.err_dvia)) return;
    if(!req('d-cap',eid,t.err_dcap)) return;
    if(!req('d-citta',eid,t.err_dcity)) return;
    if(!req('d-paese',eid,t.err_dpaese)) return;
    if(g('chk-fatt').checked){
      if(!req('f-nome',eid,t.err_fnome)) return;
      if(!req('f-cf',eid,t.err_fcf)) return;
      if(!req('f-via',eid,t.err_fvia)) return;
      if(!req('f-cap',eid,t.err_fcap)) return;
      if(!req('f-citta',eid,t.err_fcity)) return;
    }
  }
  if(n===4){
    if(!req('mc-desc',eid,t.err_desc)) return;
    if(!g('mc-cat').value){showE(eid,t.err_cat);return;}
    if(isExtraUE()&&getDogList().length===0){showE(eid,t.err_dog);return;}
  }
  goStep(n+1);
}

function validaRecapiti(){
  var t=T();
  g('err6').style.display='none';
  if(!v('rc-email')){g('rc-email').focus();showE('err6',t.err_rcemail);return;}
  if(!v('rc-tel')){g('rc-tel').focus();showE('err6',t.err_rctel);return;}
  goStep(7);
}

function rr(lbl,val){return '<div class="rrow"><span>'+lbl+'</span><span>'+val+'</span></div>';}

function buildRecap(){
  var t=T(),p=prev;
  var h='<div class="recap-t">'+t.rc_prev+' \u2014 '+p.nz+'</div>';
  h+=rr(p.sc.lb,fmt(p.base));
  if(p.ac>0) h+=rr(t.suppl,fmt(p.ac));
  if(p.ad){
    if(p.ad.iva_si){h+=rr(t.assic_imp,fmt(p.ad.imp));h+=rr(t.assic_iva,fmt(p.ad.iva));}
    else h+=rr(t.assic_imp,fmt(p.ad.imp));
  }
  h+='<div class="rtot"><span>'+(p.civaf?t.tot_iva:t.tot)+'</span><span>'+fmt(p.tot)+'</span></div>';
  if(p.esente) h+='<div style="font-size:11px;color:#047857;margin-top:6px">'+t.esente+'</div>';
  g('rc-prev').innerHTML=h;

  var m='<div class="recap-t">'+t.rc_mit+'</div>';
  m+=rr(t.r_desc.replace('Descri','Nome/Name/Nombre'),v('m-nome'));
  if(v('m-azienda')) m+=rr(t.r_azienda,v('m-azienda'));
  m+=rr(t.r_cf,v('m-cf'));m+=rr(t.r_tel,v('m-tel'));m+=rr(t.r_email,v('m-email'));
  m+=rr(t.r_addr,v('m-via')+', '+v('m-cap')+' '+v('m-citta')+(v('m-prov')?' ('+v('m-prov')+')':'')+' \u2014 '+v('m-paese'));
  g('rc-mit').innerHTML=m;

  if(g('chk-ritiro').checked){
    var ri='<div class="recap-t">'+t.rc_rit+'</div>';
    ri+=rr(t.r_addr,v('r-via')+', '+v('r-cap')+' '+v('r-citta')+(v('r-prov')?' ('+v('r-prov')+')':'')+' \u2014 '+v('r-paese'));
    if(v('r-ref')) ri+=rr(t.r_ref,v('r-ref'));
    if(v('r-tel')) ri+=rr(t.r_tel,v('r-tel'));
    g('rc-rit').innerHTML=ri;g('rc-rit').style.display='';
  }else g('rc-rit').style.display='none';

  var d='<div class="recap-t">'+t.rc_dest+'</div>';
  d+=rr(t.r_desc.replace('Descri','Nome/Name/Nombre'),v('d-nome'));
  if(v('d-azienda')) d+=rr(t.r_azienda,v('d-azienda'));
  d+=rr(t.r_tel,v('d-tel'));
  if(v('d-email')) d+=rr(t.r_email,v('d-email'));
  d+=rr(t.r_consegna,v('d-via')+', '+v('d-cap')+' '+v('d-citta')+(v('d-prov')?' ('+v('d-prov')+')':'')+' \u2014 '+v('d-paese'));
  g('rc-dest').innerHTML=d;

  if(g('chk-fatt').checked){
    var f='<div class="recap-t">'+t.rc_fatt+'</div>';
    f+=rr(t.r_cf,v('f-cf'));f+=rr(t.r_addr,v('f-via')+', '+v('f-cap')+' '+v('f-citta')+(v('f-prov')?' ('+v('f-prov')+')':'')+' \u2014 '+v('f-paese'));
    if(v('f-email')) f+=rr(t.r_fatt_email,v('f-email'));
    if(v('f-sdi')) f+=rr(t.r_sdi,v('f-sdi'));
    g('rc-fatt').innerHTML=f;g('rc-fatt').style.display='';
  }else g('rc-fatt').style.display='none';

  var mc='<div class="recap-t">'+t.rc_merce+'</div>';
  mc+=rr(t.r_desc,v('mc-desc'));mc+=rr(t.r_cat,g('mc-cat').value);
  if(v('mc-qty')) mc+=rr(t.r_qty,v('mc-qty')+' pz');
  if(v('mc-note')) mc+=rr(t.r_note,v('mc-note'));
  if(isExtraUE()){
    var dl=getDogList();
    if(dl.length>0){
      mc+='<div style="font-size:11px;font-weight:700;color:#9a3412;text-transform:uppercase;letter-spacing:.06em;margin:8px 0 4px">'+t.rc_dog+'</div>';
      for(var i=0;i<dl.length;i++) mc+=rr(dl[i].desc+' x'+dl[i].qty,fmt(dl[i].tot));
      mc+='<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:#9a3412;padding-top:6px;border-top:1px solid #fed7aa;margin-top:4px"><span>'+t.rc_dog_tot+'</span><span>'+fmt(calcDogTot())+'</span></div>';
    }
  }
  g('rc-merce').innerHTML=mc;
}

function buildPay(){
  var t=T(),p=prev;
  g('pay-amt').textContent=fmt(p.tot);
  var desc=p.nz+' \u2014 '+p.sc.lb;
  if(p.ad) desc+=' + '+t.assic_imp;
  g('pay-desc').textContent=desc;
  g('esente-msg').innerHTML=t.esente;
  g('esente-msg').style.display=p.esente?'block':'none';
  g('conf-email').textContent=v('rc-email');
  g('conf-tel').textContent=v('rc-tel');
  var pm={email:t.pref1,sms:t.pref2,entrambi:t.pref3};
  g('conf-pref').textContent=t.inv_email+(pm[g('rc-pref').value]||'');
}

function componiEmail(){
  var t=T(),p=prev,r=[];
  r.push('[Lingua/Language: '+(lingua==='it'?'Italiano':lingua==='en'?'English':'Espa\u00f1ol')+']');
  r.push('=== '+t.prev_tit.toUpperCase()+' ===');
  r.push('Destinazione/Destination: '+p.nz);
  r.push('Fascia peso: '+p.sc.lb);
  r.push(t.r_desc+' base: '+fmt(p.base));
  if(p.ac>0) r.push(t.suppl+': '+fmt(p.ac));
  if(p.ad){
    if(p.ad.iva_si){r.push(t.assic_imp+': '+fmt(p.ad.imp));r.push(t.assic_iva+': '+fmt(p.ad.iva));}
    else r.push(t.assic_imp+': '+fmt(p.ad.imp));
  }
  r.push('TOTALE/TOTAL: '+fmt(p.tot)+(p.civaf?' ('+t.tot_iva+')':''));
  if(p.esente) r.push('IVA: '+t.esente);
  r.push('');
  r.push('=== '+t.rc_mit.replace(/&#\d+;/g,'').trim().toUpperCase()+' ===');
  r.push('Nome/Name: '+v('m-nome'));
  if(v('m-azienda')) r.push(t.r_azienda+': '+v('m-azienda'));
  r.push(t.r_cf+': '+v('m-cf'));r.push(t.r_tel+': '+v('m-tel'));r.push(t.r_email+': '+v('m-email'));
  r.push(t.r_addr+': '+v('m-via')+', '+v('m-cap')+' '+v('m-citta')+(v('m-prov')?' ('+v('m-prov')+')':'')+' - '+v('m-paese'));
  r.push('');
  if(g('chk-ritiro').checked){
    r.push('=== '+t.rc_rit.replace(/&#\d+;/g,'').trim().toUpperCase()+' ===');
    r.push(t.r_addr+': '+v('r-via')+', '+v('r-cap')+' '+v('r-citta')+(v('r-prov')?' ('+v('r-prov')+')':'')+' - '+v('r-paese'));
    if(v('r-ref')) r.push(t.r_ref+': '+v('r-ref'));
    if(v('r-tel')) r.push(t.r_tel+': '+v('r-tel'));
    r.push('');
  }
  r.push('=== '+t.rc_dest.replace(/&#\d+;/g,'').trim().toUpperCase()+' ===');
  r.push('Nome/Name: '+v('d-nome'));
  if(v('d-azienda')) r.push(t.r_azienda+': '+v('d-azienda'));
  r.push(t.r_tel+': '+v('d-tel'));
  if(v('d-email')) r.push(t.r_email+': '+v('d-email'));
  r.push(t.r_consegna+': '+v('d-via')+', '+v('d-cap')+' '+v('d-citta')+(v('d-prov')?' ('+v('d-prov')+')':'')+' - '+v('d-paese'));
  r.push('');
  if(g('chk-fatt').checked){
    r.push('=== '+t.rc_fatt.replace(/&#\d+;/g,'').trim().toUpperCase()+' ===');
    r.push(t.r_cf+': '+v('f-cf'));
    r.push(t.r_addr+': '+v('f-via')+', '+v('f-cap')+' '+v('f-citta')+(v('f-prov')?' ('+v('f-prov')+')':'')+' - '+v('f-paese'));
    if(v('f-email')) r.push(t.r_fatt_email+': '+v('f-email'));
    if(v('f-sdi')) r.push(t.r_sdi+': '+v('f-sdi'));
    r.push('');
  }
  r.push('=== '+t.rc_merce.replace(/&#\d+;/g,'').trim().toUpperCase()+' ===');
  r.push(t.r_desc+': '+v('mc-desc'));r.push(t.r_cat+': '+g('mc-cat').value);
  if(v('mc-qty')) r.push(t.r_qty+': '+v('mc-qty'));
  if(v('mc-note')) r.push(t.r_note+': '+v('mc-note'));
  if(isExtraUE()){
    var dl=getDogList();
    if(dl.length>0){
      r.push('');r.push('=== '+t.dog_tit.replace(/&#\d+;/g,'').trim().toUpperCase()+' ===');
      var totDog=0;
      for(var i=0;i<dl.length;i++){r.push(dl[i].desc+' | '+dl[i].qty+' | '+fmt(dl[i].val)+' | '+fmt(dl[i].tot));totDog+=dl[i].tot;}
      r.push(t.rc_dog_tot+': '+fmt(totDog));
    }
  }
  r.push('');
  r.push('=== RECAPITI PAGAMENTO / PAYMENT CONTACTS ===');
  r.push(t.r_email+': '+v('rc-email'));r.push(t.r_tel+': '+v('rc-tel'));
  var pm={email:t.pref1,sms:t.pref2,entrambi:t.pref3};
  r.push(t.r_pref+': '+(pm[g('rc-pref').value]||''));
  if(v('rc-note')) r.push(t.r_note+': '+v('rc-note'));
  return r.join('\n');
}

function inviaRichiesta(){
  var t=T(),btn=g('btn-invia');
  btn.disabled=true;btn.textContent=t.send_loading;
  g('err7').style.display='none';
  var payload={
    _subject:'Richiesta ['+lingua.toUpperCase()+'] '+prev.nz+' - '+v('m-nome'),
    _replyto:v('rc-email'),_cc:'preventivi@dhlstore.express',
    messaggio:componiEmail(),
    nome:v('m-nome'),email_mittente:v('m-email'),
    email_recapito:v('rc-email'),cellulare_recapito:v('rc-tel'),
    destinazione:prev.nz,totale:fmt(prev.tot),lingua:lingua
  };
  fetch('https://formspree.io/f/'+FORMSPREE_ID,{
    method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify(payload)
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.ok!==false){
      g('ok-email').textContent=v('rc-email');
      g('p7').classList.remove('show');g('p-ok').classList.add('show');
      updStepper(8);window.scrollTo(0,0);
    }else{
      btn.disabled=false;btn.innerHTML=t.btn_invia;showE('err7',t.err_send);
    }
  })
  .catch(function(){
    btn.disabled=false;btn.innerHTML=t.btn_invia;showE('err7',t.err_conn);
  });
}
